

exec hook.cfg
set g_dm_no_quad_drop 1
set g_dm_no_quadfire_drop 1

set g_damage_scale 1
set ai_damage_scale 1

set g_no_nukes 1
set g_teamplay_force_join 0
set g_dm_spawns 0
set g_allow_techs 1
set maxspectators 7
set skill 3
set fraglimit 0
set g_instant_weapon_switch 1
//set g_coop_health_scaling 0.15 
set g_coop_health_scaling 0.2
set g_instagib 1
set g_dm_instant_items 1
set g_dm_no_fall_damage 0
set g_coop_squad_respawn 1
set g_coop_enable_lives 0
set g_coop_num_lives 9
set g_coop_instanced_items 1
set g_start_items "weapon_blaster 1"

set capturelimit 0
set bot_minClients 5
set cheats 0 s

set g_no_self_damage 1
set sv_eyecam 1
set sv_target_id 1

set g_allow_grapple 1
set g_grapple_fly_speed 3000
set g_grapple_pull_speed 1200

set g_hook_wave 1 
set g_use_hook 1
set hook_pullspeed 1200
set hook_speed 3000
set hook_sky 1

set bot_chat_enable 0
set bot_followplayer 1
set bot_skill 5
set horde 2
set deathmatch 1
set coop 0
set g_loadent 1

//set spectator_password 123a

set maxclients 16
kexmultiplayer maxplayers 16




set g_map_list "q64/dm1 q2dm8 q64/dm8 rdm1 rdm8 fact3 q64/dm10 xdm4 xdm2 q2dm5 q64/dm7 q64/comm test/spbox rdm12 q2dm2 q2dm7 q64/dm6 q64/dm4 q64/dm3 mgu6trial rdm6 test/mals_barrier_test rdm4 mgu3m4 q2ctf4 xdm6 xdm1 xdm3 mgu4trial q2dm6 q64/command rdm14 ec/base_ec q2ctf5 rdm9 e3/jail_e3 q64/dm2 q64/dm9 ndctf0 q2dm3 old/kmdm3 mgu6m3 xintell industry rdm5 rdm2 waste2 test/test_kaiser mgdm1 rboss q2dm4 rdm10 rdm11 rdm7"

bind "," invprev
bind "." invnext

bind n "give sentry gun; use sentry gun" //sentrygun testing
bind p "give strogg summoner; use strogg summoner" //strogg summon test
alias debugsv "exec horde.cfg; set g_instagib 0"
alias perro "exec horde.cfg;  map rdm14" //start server
alias coopp "bot_pause 1; skill 3; g_dm_spawns 0; g_use_hook 0; g_instagib 0; pvm 0; horde 0; coop 1; deathmatch 0; g_allow_grapple 0; g_coop_squad_respawn 1; g_allow_techs 0; g_coop_num_lives 7; set cheats 0 s; g_coop_health_scaling 0.23; timelimit 0; maxclients 7; kexmultiplayer maxplayers 7; bot_minClients -1"
